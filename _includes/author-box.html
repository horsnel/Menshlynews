<div class="author-box" itemprop="author" itemscope itemtype="https://schema.org/Person">
  <img src="{{ site.author.avatar }}" alt="{{ site.author.name }}" class="author-avatar" itemprop="image">
  <div class="author-info">
    <h4 class="author-name" itemprop="name">{{ site.author.name }}</h4>
    <p class="author-bio" itemprop="description">{{ site.author.bio }}</p>
    <div class="author-meta">
      <span class="verified-badge">✓ AI-Powered Analyst</span>
      <span class="post-count">Daily Publisher</span>
    </div>
  </div>
</div>
